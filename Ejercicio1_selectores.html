<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1: Selectores DOM</title>
</head>
<body>
    <h1 id="titulo">Aprendiendo Selectores</h1>

    <div id="lipsum">
        <p>Primer párrafo de Lorem Ipsum.</p>
        <p>Segundo párrafo de Lorem Ipsum.</p>
        <p>Tercer párrafo de Lorem Ipsum.</p>
    </div>

    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Último elemento de la lista</li>
    </ul>

    <form>
        <label id="input2">Nombre:</label>
        <input type="text">
        <br>
        <label>Escoge sexo:</label>
        <input type="radio" name="sexo" value="h"> H
        <input type="radio" name="sexo" value="m"> M
        <br>
        <button id="btn1">Botón 1</button>
        <button id="btn2">Botón 2</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
